[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end

[coverage:run]
source = .
omit = tests/*,*/site-packages/*,*/.venv/*,src/app.py,tests/test_app.py

[coverage:report]
omit = tests/*,*/site-packages/*,*/.venv/*,src/app.py,tests/test_app.py
show_missing = true
fail_under = 90
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.
    raise NotImplementedError
    def __repr__
